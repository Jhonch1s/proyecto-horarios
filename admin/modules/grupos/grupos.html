<div class="module-header">
    <div>
        <h2>Gestión de Grupos</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">Administra los grupos y su asignación a los ciclos lectivos.</p>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-icon" id="btn-add-ciclo" style="width: auto; padding: 12px 20px; background: rgba(255,255,255,0.1); color: white;">
            <i data-lucide="calendar"></i>
            <span>Nuevo Ciclo</span>
        </button>
        <button class="btn primary-btn btn-icon" id="btn-add-grupo" style="width: auto; padding: 12px 20px;">
            <i data-lucide="plus" style="width: 18px; height: 18px;"></i>
            <span>Nuevo Grupo</span>
        </button>
    </div>
</div>

<!-- FILTROS -->
<div class="filters-container" style="margin-bottom: 25px; display: flex; gap: 20px; flex-wrap: wrap;">
    <div class="input-group" style="margin: 0; flex: 1; min-width: 200px;">
        <label for="filter-turno">Filtrar por Turno</label>
        <select id="filter-turno">
            <option value="all">Todos los turnos</option>
            <option value="matutino">Matutino</option>
            <option value="vespertino">Vespertino</option>
        </select>
    </div>
    <div class="input-group" style="margin: 0; flex: 1; min-width: 200px;">
        <label for="filter-grado">Filtrar por Grado</label>
        <select id="filter-grado">
            <option value="all">Todos los grados</option>
        </select>
    </div>
    <div class="input-group" style="margin: 0; flex: 1; min-width: 200px;">
        <label for="filter-ciclo">Filtrar por Año Lectivo</label>
        <select id="filter-ciclo">
            <option value="all">Todos los años</option>
        </select>
    </div>
</div>

<!-- CONTENEDOR ESTADO (Loader / Error) -->
<div id="grupos-state-container" style="text-align: center; padding: 40px;">
    <div class="admin-spinner" style="margin: 0 auto;"></div>
</div>

<!-- GRILLA DE GRUPOS -->
<div class="grid-cards" id="grupos-grid" style="display: none;">
    <!-- Las tarjetas se inyectarán aquí dinámicamente -->
</div>

<!-- MODAL CREAR / EDITAR GRUPO -->
<div id="modal-grupo" class="grupos-modal hidden">
    <div class="grupos-modal-content glass-panel-admin">
        <div class="modal-header">
            <h3 id="modal-title-grupo">Nuevo Grupo</h3>
            <button class="close-btn" id="btn-close-modal-grupo">
                <i data-lucide="x"></i>
            </button>
        </div>
        
        <form id="form-grupo">
            <input type="hidden" id="grupo-id">
            
            <div class="input-group">
                <label for="grupo-nombre">Nombre del Grupo</label>
                <input type="text" id="grupo-nombre" placeholder="Ej. 1° A" required>
            </div>
            
            <div class="input-group">
                <label for="grupo-grado">Grado Escolar</label>
                <select id="grupo-grado" required>
                    <option value="" disabled selected>Seleccione el nivel</option>
                    <option value="7º">7º</option>
                    <option value="8º">8º</option>
                    <option value="9º">9º</option>
                    <option value="1º EMS">1º EMS</option>
                </select>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label for="grupo-turno">Turno</label>
                    <select id="grupo-turno" required>
                        <option value="" disabled selected>Seleccione</option>
                        <option value="matutino">Matutino</option>
                        <option value="vespertino">Vespertino</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="grupo-ciclo">Ciclo Lectivo</label>
                    <select id="grupo-ciclo" required>
                        <option value="" disabled selected>Cargando ciclos...</option>
                    </select>
                </div>
            </div>

            <div class="input-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 25px;">
                <input type="checkbox" id="grupo-activo" checked style="width: auto; padding: 0;">
                <label for="grupo-activo" style="margin: 0; cursor: pointer;">Grupo Activo</label>
            </div>

            <div class="alert hidden" id="modal-alert-grupo"></div>

            <div class="form-actions" style="margin-top: 20px; justify-content: flex-end; gap: 10px;">
                <button type="button" class="btn" id="btn-cancel-modal-grupo" style="width: auto; background: rgba(255,255,255,0.1); color: white;">Cancelar</button>
                <button type="submit" class="btn primary-btn" style="width: auto;">Guardar</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL CREAR CICLO LECTIVO -->
<div id="modal-ciclo" class="grupos-modal hidden">
    <div class="grupos-modal-content glass-panel-admin">
        <div class="modal-header">
            <h3 id="modal-title-ciclo">Nuevo Ciclo Lectivo</h3>
            <button class="close-btn" id="btn-close-modal-ciclo">
                <i data-lucide="x"></i>
            </button>
        </div>
        
        <form id="form-ciclo">
            <div class="input-group">
                <label for="ciclo-anio">Año</label>
                <input type="number" id="ciclo-anio" placeholder="Ej. 2026" required min="2020" max="2100">
            </div>

            <div class="input-group">
                <label for="ciclo-descripcion">Descripción</label>
                <input type="text" id="ciclo-descripcion" placeholder="Ej. Primer Semestre">
            </div>

            <div class="input-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 25px;">
                <input type="checkbox" id="ciclo-activo" checked style="width: auto; padding: 0;">
                <label for="ciclo-activo" style="margin: 0; cursor: pointer;">Ciclo Activo</label>
            </div>

            <div class="alert hidden" id="modal-alert-ciclo"></div>

            <div class="form-actions" style="margin-top: 20px; justify-content: flex-end; gap: 10px;">
                <button type="button" class="btn" id="btn-cancel-modal-ciclo" style="width: auto; background: rgba(255,255,255,0.1); color: white;">Cancelar</button>
                <button type="submit" class="btn primary-btn" style="width: auto;">Guardar Ciclo</button>
            </div>
        </form>
    </div>
</div>
