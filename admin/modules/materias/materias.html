<div class="module-header">
    <div>
        <h2>Gestión de Asignaturas</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">Administra las materias y su carga horaria semanal.</p>
    </div>
    <button class="btn primary-btn btn-icon" id="btn-add-materia" style="width: auto; padding: 12px 20px;">
        <i data-lucide="plus" style="width: 18px; height: 18px;"></i>
        <span>Nueva Asignatura</span>
    </button>
</div>

<!-- BARRA DE FILTROS -->
<div class="filter-container">
    <span class="filter-label"><i data-lucide="filter"></i> Filtrar por Grado:</span>
    <div class="filter-pills" id="grado-filters">
        <button class="filter-pill" data-grado="7°">7°</button>
        <button class="filter-pill" data-grado="8°">8°</button>
        <button class="filter-pill" data-grado="9°">9°</button>
        <button class="filter-pill" data-grado="1° EMS">1° EMS</button>
        <button class="btn-clear-filters hidden" id="btn-clear-filters">
            <i data-lucide="x-circle"></i> Limpiar
        </button>
    </div>
</div>

<!-- CONTENEDOR ESTADO (Loader / Error) -->
<div id="materias-state-container" style="text-align: center; padding: 40px;">
    <div class="admin-spinner" style="margin: 0 auto;"></div>
</div>

<!-- GRILLA DE MATERIAS -->
<div class="grid-cards" id="materias-grid" style="display: none;">
    <!-- Las tarjetas se inyectarán aquí dinámicamente con JS -->
</div>

<!-- MODAL CREAR / EDITAR MATERIA -->
<div id="modal-materia" class="materias-modal hidden">
    <div class="materias-modal-content glass-panel-admin">
        <div class="modal-header">
            <h3 id="modal-title">Nueva Asignatura</h3>
            <button class="close-btn" id="btn-close-modal-materia">
                <i data-lucide="x"></i>
            </button>
        </div>
        
        <form id="form-materia">
            <input type="hidden" id="materia-id">
            
            <div class="input-group">
                <label for="materia-nombre">Nombre de la Asignatura</label>
                <input type="text" id="materia-nombre" placeholder="Ej. Matemáticas I" required>
            </div>

            <div class="input-group">
                <label for="materia-grado">Grado</label>
                <select id="materia-grado" required>
                    <option value="" disabled selected>Seleccione un grado</option>
                    <option value="7°">7°</option>
                    <option value="8°">8°</option>
                    <option value="9°">9°</option>
                    <option value="1° EMS">1° EMS</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="materia-carga">Carga Horaria (Horas semanales)</label>
                <input type="number" id="materia-carga" placeholder="Ej. 4" min="1" max="20" required>
            </div>

            <div class="input-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 25px;">
                <input type="checkbox" id="materia-activo" checked style="width: auto; padding: 0;">
                <label for="materia-activo" style="margin: 0; cursor: pointer;">Asignatura Activa (Visible)</label>
            </div>

            <div class="alert hidden" id="modal-alert-materia"></div>

            <div class="form-actions" style="margin-top: 20px; justify-content: flex-end; gap: 10px;">
                <button type="button" class="btn" id="btn-cancel-modal-materia" style="width: auto; background: rgba(255,255,255,0.1); color: white;">Cancelar</button>
                <button type="submit" class="btn primary-btn" style="width: auto;">Guardar</button>
            </div>
        </form>
    </div>
</div>
