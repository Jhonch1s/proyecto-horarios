<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Horarios - Iniciar Sesión</title>
    <!-- Google Fonts para un aspecto Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Estilos de la aplicación -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="background-mesh"></div>

    <main class="container">
        <div class="glass-panel" id="auth-panel">
            
            <!-- CONTENEDOR DE LOGIN -->
            <div class="form-container" id="login-container">
                <div class="header">
                    <div class="logo">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path><path d="M16 18h.01"></path></svg>
                    </div>
                    <h1>Bienvenido de nuevo</h1>
                    <p>Ingresa tus credenciales para acceder al sistema</p>
                </div>
                
                <form id="login-form">
                    <div class="input-group">
                        <label for="login-email">Correo Electrónico</label>
                        <input type="email" id="login-email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Recordarme
                        </label>
                        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <button type="submit" class="btn primary-btn" id="btn-login">
                        <span class="btn-text">Iniciar Sesión</span>
                        <div class="loader hidden" id="login-loader"></div>
                    </button>
                    <div class="alert hidden" id="login-alert"></div>
                </form>

                <p class="switch-mode">
                    ¿No tienes cuenta? <button type="button" class="link-btn" id="show-register">Regístrate aquí</button>
                </p>
            </div>

            <!-- CONTENEDOR DE REGISTRO -->
            <div class="form-container hidden-form" id="register-container">
                <div class="header">
                    <div class="logo">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                    </div>
                    <h1>Crear Cuenta</h1>
                    <p>Regístrate para ver tu disponibilidad horaria</p>
                </div>
                
                <form id="register-form">
                    <div class="input-group">
                        <label for="register-name">Nombre Completo</label>
                        <input type="text" id="register-name" placeholder="Ej. Juan Pérez" required>
                    </div>
                    <div class="input-group">
                        <label for="register-email">Correo Electrónico</label>
                        <input type="email" id="register-email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="register-password">Contraseña</label>
                        <input type="password" id="register-password" placeholder="••••••••" required minlength="6">
                    </div>
                    <button type="submit" class="btn primary-btn" id="btn-register">
                        <span class="btn-text">Registrarse</span>
                        <div class="loader hidden" id="register-loader"></div>
                    </button>
                    <div class="alert hidden" id="register-alert"></div>
                </form>

                <p class="switch-mode">
                    ¿Ya tienes cuenta? <button type="button" class="link-btn" id="show-login">Inicia Sesión</button>
                </p>
            </div>

        </div>
    </main>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
